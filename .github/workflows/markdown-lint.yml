name: Markdown lint

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.markdownlint.json'
      - '.github/workflows/markdown-lint.yml'
  push:
    branches: [main]
    paths:
      - '**/*.md'

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !node_modules
            !**/node_modules/**
            !**/CHANGELOG.md
            !packages/cortex-dashboard/.next/**
            !templates/.pi/**
            !REVIEW.md
            !.tmp-validation/**
            !AGENTS.md
            !docs/plans/**
