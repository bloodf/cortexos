name: release-paperclip-adapter

# Manual-trigger only per repo policy: no automated release triggers.
# Tag trigger disabled per repo policy: manual-trigger only
# on:
#   push:
#     tags:
#       - "paperclip-adapter-v*"

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish in --dry-run mode (no upload)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  id-token: write  # required for npm provenance

jobs:
  release:
    name: Build, test, and publish @cortexos/paperclip-adapter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/paperclip-adapter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      - name: Coverage gate
        run: pnpm run test:coverage

      - name: npm publish (dry run)
        run: pnpm publish --dry-run --access=public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: npm publish
        if: ${{ inputs.dry_run != 'true' }}
        run: pnpm publish --provenance --access=public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
