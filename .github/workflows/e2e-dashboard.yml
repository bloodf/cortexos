name: dashboard-e2e

# V11 — Playwright dashboard E2E. Manual-trigger only (per user rule:
# E2E GitHub workflows are manual-trigger only, never automated).

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Override E2E_BASE_URL (leave blank to use built-in dev server)"
        required: false
        default: ""

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: List specs (compile check)
        run: npx playwright test --list

      - name: Run E2E
        env:
          E2E_BASE_URL: ${{ inputs.base_url }}
          CI: "true"
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: dashboard/playwright-report
          retention-days: 14
