name: Secrets scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1'

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  secrets-layout:
    name: templates/.secrets layout
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Reject plaintext .env under templates/.secrets/
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          bad=()
          for f in templates/.secrets/*; do
            base="$(basename "$f")"
            case "$base" in
              *.env.example|*.enc.yaml) : ;;
              *.env)
                bad+=("$f") ;;
              *)
                # unknown filetype — warn but don't fail
                echo "::warning file=$f::unexpected file under templates/.secrets/" ;;
            esac
          done
          if [[ ${#bad[@]} -gt 0 ]]; then
            echo "::error::plaintext .env files are forbidden under templates/.secrets/:"
            printf '  %s\n' "${bad[@]}"
            exit 1
          fi
      - name: Reject unencrypted *.enc.yaml (must contain sops metadata or be a template)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          bad=()
          for f in templates/.secrets/*.enc.yaml; do
            # Templates carry the documented header comment; real files carry a sops: block.
            # A file with neither is suspicious — and a file containing high-entropy token-like
            # strings without sops metadata is rejected.
            if grep -q '^sops:' "$f"; then
              continue
            fi
            # Template path: every value must be <replace-me> or a non-secret literal.
            # Reject if any line matches a token-like high-entropy pattern outside metadata.
            if grep -E -v '^[[:space:]]*#|^[[:space:]]*$' "$f" \
              | grep -E -i '(api[_-]?key|secret|token|password|hmac|bearer)' \
              | grep -E -v '<replace-me[^>]*>|"<replace-me[^>]*>"' >/dev/null; then
              bad+=("$f")
            fi
          done
          if [[ ${#bad[@]} -gt 0 ]]; then
            echo "::error::plaintext .enc.yaml with real-looking secret values (no sops: block):"
            printf '  %s\n' "${bad[@]}"
            exit 1
          fi
