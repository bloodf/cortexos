# CortexOS CI — blocking gates
#
# Source of truth: docs/
#
# Gates (all blocking, no warn-only):
#   PR / push-main  → 1 typecheck · 2 lint · 3 format · 4 markdown · 5 unit · 6 coverage
#                     9 e2e-chromium · 10 build
#                     11 codeql · 12 gitleaks · 13 dep-audit · shell
#   push-main only  → 14 e2e-full-matrix · 15 sbom (informational)
#
# Note: the real-host smoke test (scripts/smoke/real-host.sh) is run
# locally on the OrbStack VM by the developer, not in CI. See
# `scripts/smoke/real-host.sh` header for the manual run command.
#
# Husky-as-CI doctrine: every gate below also runs locally via scripts/ci-local.sh.
# A green local run is the *floor*; CI is the *contract*.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group:
  # Nightly matrix run — the 50-run flake budget is computed on the main branch,
  # not on a moving PR. Nightly catches drift that PRs would mask.
  schedule:
    - cron: '17 3 * * *' # 03:17 UTC daily
  workflow_dispatch:

# Cancel in-flight PR runs when a new commit lands on the same PR. Main-branch
# and nightly runs are NOT cancelled — they are the audit trail.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Default to least privilege; individual jobs widen as needed.
permissions:
  contents: read

env:
  # Locked toolchain
  NODE_VERSION: '24.16.0'
  PNPM_VERSION: '11.5.1'
  # Force CI=1 for any test that branches on it (vitest, playwright).
  CI: '1'

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Gate 2 · Lint (ESLint, Airbnb-style via eslint-config-airbnb-extended)
  # ────────────────────────────────────────────────────────────────────────
  lint:
    name: Gate 2 · Lint (ESLint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Frozen-lockfile install
        run: pnpm install --frozen-lockfile
      - name: Lint (monorepo)
        run: pnpm -r --if-present run lint

  # ────────────────────────────────────────────────────────────────────────
  # Gate 3 · Format check (Prettier)
  # ────────────────────────────────────────────────────────────────────────
  format:
    name: Gate 3 · Prettier check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prettier check
        run: pnpm -r --if-present exec prettier --check .

  # ────────────────────────────────────────────────────────────────────────
  # Gate 4 · Markdown lint (docs/)
  # ────────────────────────────────────────────────────────────────────────
  markdown-lint:
    name: Gate 4 · Markdown lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Lint docs/ and README/AGENTS
        # Uses the same tool as the standalone .github/workflows/markdown-lint.yml.
        run: |
          npx --yes markdownlint-cli2 \
            'docs/**/*.md' \
            'README.md' \
            'CONTRIBUTING.md' \
            'AGENTS.md' \
            'CLAUDE.md' \
            '#node_modules' \
            '#**/node_modules/**' \
            '#**/CHANGELOG.md' \
            '#**/build/**'

  # ────────────────────────────────────────────────────────────────────────
  # Gate 1 · Typecheck (tsc)
  # ────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Gate 1 · Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck (monorepo)
        run: pnpm -r --if-present run typecheck

  # ────────────────────────────────────────────────────────────────────────
  # Gate 5 · Unit + integration tests (Vitest, no coverage here)
  # ────────────────────────────────────────────────────────────────────────
  test:
    name: Gate 5 · Unit + Integration (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Vitest run
        run: pnpm -r --if-present run test

  # ────────────────────────────────────────────────────────────────────────
  # Gate 6 · Coverage (dashboard-next 70/60 baseline)
  # Thresholds: lines 70, branches 60, functions 70, statements 70
  # Enforced by packages/dashboard-next/vitest.config.ts — the vitest run
  # itself fails this job when any metric drops below those values.
  # ────────────────────────────────────────────────────────────────────────
  coverage:
    name: Gate 6 · Coverage (dashboard-next 70/60 baseline)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Vitest with coverage (thresholds enforced in vitest.config.ts)
        # dashboard-next currently enforces lines: 70, branches: 60,
        # functions: 70, statements: 70 via vitest.config.ts thresholds.
        # The vitest run fails this job when any metric drops below those values.
        run: pnpm -r --if-present run test:coverage
      - name: Upload coverage to Codecov
        if: hashFiles('./coverage/lcov.info') != ''
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: cortexos-coverage
          fail_ci_if_error: false
          # Disable the GitHub Actions bot comment that Codecov injects on PRs;
          # we keep coverage reporting in the CI summary, not in PR threads.
          disable_github_actions_annotations: false
          # Token is optional for OSS; falls back to public uploader.
          token: ${{ env.CODECOV_TOKEN }}

  # ────────────────────────────────────────────────────────────────────────
  # Gate 9 · E2E (Chromium only — fast lane for PRs)
  # ────────────────────────────────────────────────────────────────────────
  e2e-chromium:
    name: Gate 9 · E2E (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      E2E_MOCK_MODE: '1'
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Install Playwright Chromium + system deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E (chromium project only)
        run: pnpm -r --if-present exec playwright test --project=chromium
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-chromium
          path: |
            **/playwright-report
            **/test-results
          retention-days: 7
          if-no-files-found: ignore

  # ────────────────────────────────────────────────────────────────────────
  # Gate 10 · Production build (adapter-node)
  # ────────────────────────────────────────────────────────────────────────
  build:
    name: Gate 10 · Production build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build (monorepo)
        run: pnpm -r --if-present run build
      - name: Verify no remote-functions config sneaked in
        # Remote Functions (svelte.config.* remoteFunctions / experimental.async)
        # are experimental and forbidden in this repo.
        run: |
          set -euo pipefail
          if grep -RIn --include='svelte.config.*' \
              -E 'remoteFunctions|experimental\.async' packages/ ; then
            echo "::error::Remote Functions are forbidden in svelte.config.*"
            exit 1
          fi

  # ────────────────────────────────────────────────────────────────────────
  # Gate 11 · CodeQL (security — high/critical findings block)
  # ────────────────────────────────────────────────────────────────────────
  codeql:
    name: Gate 11 · CodeQL (security)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'
          # CodeQL auto-uploads SARIF; the GitHub code-scanning check that
          # appears under the Security tab is the source of truth for findings.
          # The job exits non-zero on any high/critical finding by default.

  # ────────────────────────────────────────────────────────────────────────
  # Gate 12 · gitleaks (secret detection)
  # ────────────────────────────────────────────────────────────────────────
  gitleaks:
    name: Gate 12 · gitleaks (secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Use the committed config if present; otherwise default rules.
          GITLEAKS_CONFIG: .gitleaks.toml

  # ────────────────────────────────────────────────────────────────────────
  # Gate 13 · Dependency audit (pnpm audit — high/critical block)
  # ────────────────────────────────────────────────────────────────────────
  audit:
    name: Gate 13 · Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit (high/critical blocking)
        # `--prod` ignores dev deps (they don't ship to prod).
        # `--audit-level=high` exits non-zero on any high or critical CVE.
        run: pnpm audit --prod --audit-level=high

  # ────────────────────────────────────────────────────────────────────────
  # Gate 15 · Shell scripts (shellcheck --severity=error)
  # ────────────────────────────────────────────────────────────────────────
  shell:
    name: Gate 15 · Shell scripts (shellcheck + bash -n)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: bash -n parse-check (all *.sh outside node_modules)
        run: |
          set -e
          mapfile -d '' files < <(find scripts templates/scripts stacks -name '*.sh' \
            -not -path '*/node_modules/*' -print0 2>/dev/null || true)
          for f in "${files[@]}"; do bash -n "$f"; done
      - name: shellcheck --severity=error
        run: |
          shellcheck --severity=error \
            $(find scripts templates/scripts stacks -name '*.sh' \
              -not -path '*/node_modules/*' 2>/dev/null || true)

  # ────────────────────────────────────────────────────────────────────────
  # Gate 14 · E2E full matrix (chromium + firefox + webkit) — main only
  # ────────────────────────────────────────────────────────────────────────
  e2e-full:
    name: Gate 14 · E2E full matrix (chromium+firefox+webkit)
    # main-branch pushes + nightly + manual dispatch. NOT on PRs — too slow
    # and the chromium lane (Gate 9) already covers the per-PR surface.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [lint, format, typecheck, test, build]
    env:
      E2E_MOCK_MODE: '1'
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-${{ runner.os }}-full-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Install Playwright (chromium + firefox + webkit)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps
      - name: Run E2E full matrix
        run: pnpm -r --if-present exec playwright test
      - name: Upload full Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-full
          path: |
            **/playwright-report
            **/test-results
          retention-days: 30
          if-no-files-found: ignore

  # ────────────────────────────────────────────────────────────────────────
  # Gate 14b · SBOM (informational; on main + nightly only)
  # ────────────────────────────────────────────────────────────────────────
  sbom:
    name: SBOM (informational)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate CycloneDX SBOM (JSON)
        # Informational, never blocks.
        # Artifact is uploaded for downstream tooling (vuln scanning, license audit).
        run: |
          pnpm dlx @cyclonedx/cyclonedx-npm --output-format JSON \
            --output-file sbom.cortex-dashboard.json \
            --spec-version 1.5 || echo "::warning::SBOM generation failed (informational only)"
      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cortex-dashboard
          path: sbom.cortex-dashboard.json
          retention-days: 90
          if-no-files-found: ignore

  # ────────────────────────────────────────────────────────────────────────
  # Aggregate gate-check — fails if any required gate failed.
  # This job is the source of truth for the "ci" branch-protection check
  # (set Required status check to "CI / all-gates-pass" in branch protection).
  # We enumerate each needs' result explicitly — bash variables are not
  # interpolated inside GitHub's ${{ }} template expressions, so a dynamic
  # lookup has to be written out job-by-job.
  # ────────────────────────────────────────────────────────────────────────
  all-gates-pass:
    name: all-gates-pass
    runs-on: ubuntu-latest
    needs:
      - lint
      - format
      - markdown-lint
      - typecheck
      - test
      - coverage
      - e2e-chromium
      - build
      - codeql
      - gitleaks
      - audit
      - shell
    if: always()
    steps:
      - name: Aggregate gate result
        env:
          RESULT_LINT: ${{ needs.lint.result }}
          RESULT_FORMAT: ${{ needs.format.result }}
          RESULT_MARKDOWN_LINT: ${{ needs.markdown-lint.result }}
          RESULT_TYPECHECK: ${{ needs.typecheck.result }}
          RESULT_TEST: ${{ needs.test.result }}
          RESULT_COVERAGE: ${{ needs.coverage.result }}
          RESULT_E2E_CHROMIUM: ${{ needs.e2e-chromium.result }}
          RESULT_BUILD: ${{ needs.build.result }}
          RESULT_CODEQL: ${{ needs.codeql.result }}
          RESULT_GITLEAKS: ${{ needs.gitleaks.result }}
          RESULT_AUDIT: ${{ needs.audit.result }}
          RESULT_SHELL: ${{ needs.shell.result }}
        run: |
          set -uo pipefail
          failed=()
          declare -A results=(
            [lint]="$RESULT_LINT"
            [format]="$RESULT_FORMAT"
            [markdown-lint]="$RESULT_MARKDOWN_LINT"
            [typecheck]="$RESULT_TYPECHECK"
            [test]="$RESULT_TEST"
            [coverage]="$RESULT_COVERAGE"
            [e2e-chromium]="$RESULT_E2E_CHROMIUM"
            [build]="$RESULT_BUILD"
            [codeql]="$RESULT_CODEQL"
            [gitleaks]="$RESULT_GITLEAKS"
            [audit]="$RESULT_AUDIT"
            [shell]="$RESULT_SHELL"
          )
          for gate in "${!results[@]}"; do
            r="${results[$gate]}"
            echo "  gate ${gate}: ${r}"
            if [[ "$r" != "success" ]]; then
              failed+=("$gate")
            fi
          done
          if [[ ${#failed[@]} -gt 0 ]]; then
            echo "::error::Failed gates: ${failed[*]}"
            exit 1
          fi
          echo "All required gates passed."
