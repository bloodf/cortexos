# DEPRECATED under CortexOS doctrine — agent mention routing moves to AgentGateway + hash-chained audit log.
# Kept as a manual-trigger reference; bootstrap-project.sh does not exist and these workflows are not auto-included.
name: Agent Mention Router

# Manual-trigger only per CortexOS policy: E2E GitHub workflows are never automated.
# Workflow itself is DEPRECATED — canonical mention routing is AgentGateway + hash-chained audit log.
on:
  workflow_dispatch:
    inputs:
      event_target:
        description: 'Issue or PR number to route'
        required: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  route-agent-mentions:
    runs-on: ubuntu-latest
    steps:
      - name: Route @pm token to PM labels
        uses: actions/github-script@v7
        with:
          script: |
            // Token -> label spec. Each entry matches an `@<role>` mention in
            // issue/PR title, body, or comment, and applies the corresponding
            // `agent:<role>` label plus `needs-clarification`.
            const tokenSpecs = [
              { token: 'pm',         label: 'agent:pm',         color: '5319e7' },
              { token: 'cto',        label: 'agent:cto',        color: '5319e7' },
              { token: 'ceo',        label: 'agent:ceo',        color: '5319e7' },
              { token: 'po',         label: 'agent:po',         color: '5319e7' },
              { token: 'staff-eng',  label: 'agent:staff-eng',  color: '5319e7' },
              { token: 'qa',         label: 'agent:qa',         color: '5319e7' },
              { token: 'uxui',       label: 'agent:uxui',       color: '5319e7' },
              { token: 'cortex',     label: 'agent:cortex',     color: '5319e7' },
              { token: 'antagonist', label: 'agent:antagonist', color: '5319e7' },
            ];
            const clarificationSpec = {
              name: 'needs-clarification',
              color: 'fbca04',
              description: 'Blocked pending clarification',
            };

            function getTarget() {
              const payload = context.payload;

              if (payload.issue) {
                return {
                  number: payload.issue.number,
                  text: [payload.issue.title, payload.issue.body, payload.comment?.body]
                    .filter(Boolean)
                    .join('\n\n'),
                };
              }

              if (payload.pull_request) {
                return {
                  number: payload.pull_request.number,
                  text: [payload.pull_request.title, payload.pull_request.body, payload.comment?.body]
                    .filter(Boolean)
                    .join('\n\n'),
                };
              }

              if (payload.comment && payload.pull_request) {
                return {
                  number: payload.pull_request.number,
                  text: payload.comment.body || '',
                };
              }

              return null;
            }

            const target = getTarget();
            if (!target) {
              core.info('No routable issue or PR target found.');
              return;
            }

            const text = target.text || '';
            const matched = tokenSpecs.filter((spec) =>
              new RegExp(`(^|\\s)@${spec.token}\\b`, 'i').test(text)
            );

            if (matched.length === 0) {
              core.info('No routable @<role> tokens found.');
              return;
            }

            const ensureLabel = async (spec) => {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: spec.name,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: spec.name,
                  color: spec.color,
                  description: spec.description || `Routed to ${spec.name}`,
                });
              }
            };

            const labelsToApply = [];
            for (const spec of matched) {
              const labelSpec = {
                name: spec.label,
                color: spec.color,
                description: `Routed to the ${spec.token.toUpperCase()} agent`,
              };
              await ensureLabel(labelSpec);
              labelsToApply.push(labelSpec.name);
            }
            await ensureLabel(clarificationSpec);
            labelsToApply.push(clarificationSpec.name);

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: target.number,
              labels: labelsToApply,
            });

            core.info(`Routed #${target.number} to PM via agent:pm + needs-clarification labels.`);
