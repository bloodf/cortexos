name: Request AI PR Reviews

# Manual-trigger only per CortexOS policy: E2E GitHub workflows are never automated.
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to request reviews on'
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  request-ai-reviews:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Create or update AI review request comment
        uses: actions/github-script@v7
        env:
          CODEX_REVIEW_TRIGGER: "@codex review this PR for correctness, tests, CI impact, and hidden edge cases."
          CLAUDE_REVIEW_TRIGGER: "@claude review this PR for architecture, security, maintainability, and regression risk."
          CURSOR_REVIEW_TRIGGER: "@cursor review this PR for code quality, framework usage, and practical implementation issues."
        with:
          script: |
            const marker = '<!-- cortexos-ai-review-request -->';
            const pr = context.payload.pull_request;
            const body = `${marker}
            ## AI review request

            ${process.env.CODEX_REVIEW_TRIGGER}

            ${process.env.CLAUDE_REVIEW_TRIGGER}

            ${process.env.CURSOR_REVIEW_TRIGGER}

            If this repository uses different trigger handles or slash commands, update \`.github/AI_REVIEWERS.md\` and this workflow.
            `.replace(/^ {12}/gm, '').trim();

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }
