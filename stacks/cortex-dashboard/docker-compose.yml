# Cortex Dashboard — LEGACY Docker Compose build.
#
# This file is preserved for reference and local experimentation only.
# Production deployments use the native systemd service at
# templates/systemd/cortex-dashboard.service, built via
# packages/cortex-dashboard/scripts/native-build.sh.
#
# Build context is the packages/cortex-dashboard/ source tree (materialized on the VPS by the
# operator-laptop bootstrap via `git archive | ssh tar -x`). No rsync, no
# laptop-side Next.js build. The VPS builds the image locally with
# `docker compose build`.
#
# Postgres, NATS, systemd, Docker, process, storage, network, and terminal
# operations target the VPS host. The dashboard does NOT manage sibling
# service lifecycles, hence no `depends_on` here — host networking and the
# Docker socket are the integration seams.
services:
  cortex-dashboard:
    build:
      context: ../..
      dockerfile: packages/cortex-dashboard/Dockerfile
    image: cortex-dashboard:local
    container_name: cortex-dashboard
    restart: unless-stopped
    # Host administration pages intentionally inspect and operate on the VPS,
    # not the dashboard container. Host networking keeps localhost probes pointed
    # at the machine, while pid:host + privileged gives nsenter the namespace
    # access required by systemctl, ps, df, network, and terminal.
    network_mode: host
    pid: host
    privileged: true
    user: root
    env_file:
      - /opt/cortexos/.secrets/dashboard.env
    environment:
      PORT: "3080"
      HOSTNAME: 127.0.0.1
      NODE_ENV: production
      DB_HOST: 127.0.0.1
      SETUP_STATE_PATH: /run/cortexos/setup-state.json
      CORTEX_PUBLIC_BASE_URL: "${CORTEX_PUBLIC_BASE_URL:-}"
      OPENCLAW_BASE: /home/cortexos/.openclaw
      AGENT_SCAN_PATHS: /home/cortexos/.openclaw
      TERMINAL_SSH_HOST: 127.0.0.1
      TERMINAL_SSH_PORT: "22"
      TERMINAL_SSH_USER: cortexos
      TERMINAL_SSH_KEY: /home/cortexos/.ssh/id_ed25519
    volumes:
      - "${CORTEXOS_ROOT:-/opt/cortexos}/.secrets/.setup-state.json:/run/cortexos/setup-state.json:ro"
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/cortexos/.ssh:/home/cortexos/.ssh:ro
      - /home/cortexos/.openclaw:/home/cortexos/.openclaw
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3080/en/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
