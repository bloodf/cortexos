services:
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cortex-pgadmin
    restart: unless-stopped
    env_file:
      - ../../.secrets/pgadmin.env
    environment:
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
    ports:
      - "127.0.0.1:5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1/misc/ping\", timeout=5)'"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  pgadmin_data:
