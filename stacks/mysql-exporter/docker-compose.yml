services:
  mysql-exporter:
    image: prom/mysqld-exporter:v0.15.1
    container_name: cortex-mysql-exporter
    user: "0:0"
    restart: unless-stopped
    command:
      - "--config.my-cnf=/cfg/.my.cnf"
      - "--mysqld.address=mysql:3306"
      - "--no-collect.slave_status"
    volumes:
      - /opt/cortexos/.secrets/mysql-exporter.my.cnf:/cfg/.my.cnf:ro
    ports:
      - "127.0.0.1:9104:9104"
    networks:
      - mysql_default
      - cortex-internal

networks:
  mysql_default:
    external: true
  cortex-internal:
    external: true
