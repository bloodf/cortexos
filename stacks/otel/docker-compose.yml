services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: cortex-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:8889:8889"
    volumes:
      - ./otel-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      - cortex-internal

networks:
  cortex-internal:
    external: true
