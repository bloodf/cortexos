# cortex-paperclip-bridge — LEGACY Docker Compose build.
#
# This file is preserved for reference and local experimentation only.
# Production deployments use the native systemd service at
# templates/systemd/cortex-paperclip-bridge.service, running the Node.js
# entrypoint directly on the host.
services:
  cortex-paperclip-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    image: cortex-paperclip-bridge:local
    container_name: cortex-paperclip-bridge
    restart: unless-stopped
    env_file:
      - /opt/cortexos/.secrets/paperclip.env
    ports:
      - "127.0.0.1:8089:8089"
    # No `depends_on`: NATS + Postgres are brought up by their own spokes
    # (prompts/tools/30-nats.md, prompts/tools/14-postgresql.md) and reached
    # over the external `cortex-net` network. Operator must start those first.
    networks:
      - cortex-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8089/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  cortex-net:
    external: true
