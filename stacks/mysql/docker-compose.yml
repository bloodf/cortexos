services:
  mysql:
    image: mysql:8
    container_name: cortex-mysql
    restart: unless-stopped
    env_file:
      - ../../.secrets/mysql.env
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 30s
      timeout: 10s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: cortex-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_ABSOLUTE_URI: https://cortexos.tailfd052e.ts.net/phpmyadmin/
    ports:
      - "127.0.0.1:8082:80"

volumes:
  mysql_data:
