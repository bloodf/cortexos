# CortexOS — Langfuse v3 self-host stack.
#
# Components:
#   - langfuse-web:    UI + API + tracing ingest (port 3000)
#   - langfuse-worker: async ingestion pipeline → ClickHouse + S3/MinIO
#   - clickhouse:      analytical event store for traces & observations
#   - minio:           internal S3-compatible blob store for event bodies +
#                      large media. Internal compose service only (not an
#                      external object store — Railway-only rule for external
#                      buckets is unaffected).
#
# Postgres is reused from the core stack (`prompts/tools/14-postgresql.md`).
# Operators MUST create the `langfuse` database + role and populate
# `/opt/cortexos/.secrets/langfuse.env` from
# `templates/.secrets/langfuse.enc.yaml` before starting the stack.
#
# Tailscale-only binding is enforced via `TAILSCALE_IP`.

name: cortex-langfuse

x-langfuse-env-file: &langfuse-env-file
  - /opt/cortexos/.secrets/langfuse.env

services:
  langfuse-web:
    container_name: cortex-langfuse-web
    image: docker.io/langfuse/langfuse:3
    restart: unless-stopped
    env_file: *langfuse-env-file
    depends_on:
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      langfuse-worker:
        condition: service_started
    environment:
      TELEMETRY_ENABLED: "false"
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
    ports:
      # Host 3001 → container 3000. Port 3000 on the host is Grafana.
      - "${TAILSCALE_IP:-127.0.0.1}:3001:3000"
    networks:
      - cortex-net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://' + require('os').networkInterfaces().eth0[0].address + ':3000/api/public/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  langfuse-worker:
    container_name: cortex-langfuse-worker
    image: docker.io/langfuse/langfuse-worker:3
    restart: unless-stopped
    env_file: *langfuse-env-file
    depends_on:
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
    networks:
      - cortex-net

  clickhouse:
    container_name: cortex-langfuse-clickhouse
    image: docker.io/clickhouse/clickhouse-server:24.12-alpine
    restart: unless-stopped
    env_file: *langfuse-env-file
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    networks:
      - cortex-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8123/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  minio:
    container_name: cortex-langfuse-minio
    image: docker.io/minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    env_file: *langfuse-env-file
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - minio-data:/data
    networks:
      - cortex-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  clickhouse-data:
  clickhouse-logs:
  minio-data:

networks:
  cortex-net:
    external: true
