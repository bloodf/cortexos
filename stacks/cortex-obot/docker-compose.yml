# CortexOS Obot — MCP Gateway Platform
# Replaces cortex-agentgateway (custom Python MCP proxy) with Obot for
# centralized MCP server hosting, discovery, auth, and audit.
#
# Uses CortexOS's existing PostgreSQL instance with pgvector extension.
# Requires: pgvector extension installed in the target database.
#
# Env file: /opt/cortexos/.secrets/obot.env
#   OBOT_SERVER_DSN=postgres://obot:<password>@<pg-host>:5432/obot
#   OPENAI_API_KEY=<key>
#   OBOT_SERVER_HOSTNAME=cortexos.<tailnet>.ts.net:<caddy-port>
#   OBOT_SERVER_ENABLE_AUTHENTICATION=true
#   OBOT_BOOTSTRAP_TOKEN=<token>

services:
  cortex-obot:
    image: ghcr.io/obot-platform/obot:latest
    container_name: cortex-obot
    restart: unless-stopped
    env_file:
      - /opt/cortexos/.secrets/obot.env
    environment:
      - OBOT_SERVER_MCPRUNTIME_BACKEND=docker
    volumes:
      - obot-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:8090:8080"
    labels:
      com.cortexos.service: obot
      com.cortexos.managed: true

volumes:
  obot-data:
