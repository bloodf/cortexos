services:
  floci:
    image: floci/floci:latest
    container_name: cortex-floci
    restart: unless-stopped
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      DEBUG: "0"
      PERSISTENCE: "1"
    volumes:
      - floci_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cortex-internal

volumes:
  floci_data:

networks:
  cortex-internal:
    external: true
