services:
  floci:
    image: localstack/localstack:3
    container_name: cortex-floci
    restart: unless-stopped
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      SERVICES: s3,lambda,dynamodb,sqs,sns,iam,cloudformation
      DEBUG: "0"
      PERSISTENCE: "1"
    volumes:
      - floci_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cortex-internal

volumes:
  floci_data:

networks:
  cortex-internal:
    external: true
