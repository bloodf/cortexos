services:
  prometheus:
    image: prom/prometheus
    container_name: cortex-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.external-url=https://${CORTEX_DOMAIN}/prometheus/'
      - '--web.route-prefix=/prometheus'
    environment:
      CORTEX_DOMAIN: ${CORTEX_DOMAIN}
    ports:
      - "127.0.0.1:9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring_default
      - cortex-internal

  loki:
    image: grafana/loki
    container_name: cortex-loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring_default
      - cortex-internal

  grafana:
    image: grafana/grafana
    container_name: cortex-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://${CORTEX_DOMAIN}/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring_default
      - cortex-internal

  node-exporter:
    image: prom/node-exporter
    container_name: cortex-node-exporter
    restart: unless-stopped
    network_mode: host
    pid: host
    command:
      - '--web.listen-address=0.0.0.0:9100'
      - '--path.rootfs=/host'
    volumes:
      - /:/host:ro,rslave

  cadvisor:
    image: gcr.io/cadvisor/cadvisor
    container_name: cortex-cadvisor
    restart: unless-stopped
    privileged: true
    command:
      - --url_base_prefix=/cadvisor
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    devices:
      - /dev/kmsg
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/cadvisor/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - monitoring_default
      - cortex-internal

  fluent-bit:
    image: fluent/fluent-bit
    container_name: cortex-fluent-bit
    restart: unless-stopped
    ports:
      - "127.0.0.1:24224:24224"
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
    depends_on:
      - loki
    networks:
      - monitoring_default
      - cortex-internal

  snmp-exporter:
    image: prom/snmp-exporter:latest
    container_name: cortex-snmp-exporter
    restart: unless-stopped
    ports:
      - "127.0.0.1:9116:9116"
    volumes:
      - /opt/cortexos/stacks/monitoring/snmp-exporter/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    command:
      - --config.file=/etc/snmp_exporter/snmp.yml
    networks:
      - monitoring_default
      - cortex-internal

  adguard-exporter:
    # Patched build: upstream image uses POST /control/clients/search which
    # only exists in AdGuard Home >= v0.107.56. Our monitored instance runs
    # v0.107.53, so the endpoint returns 404. The local Dockerfile clones
    # upstream, applies clients-v0.107.53.patch, and uses GET /control/clients
    # to resolve names from persistent + auto clients.
    build:
      context: ./adguard-exporter
      dockerfile: Dockerfile
      args:
        ADGUARD_EXPORTER_REF: 9d49a564a88d46d32a5fa5afa42b620e2ce40af7
    container_name: cortex-adguard-exporter
    restart: unless-stopped
    ports:
      - "127.0.0.1:9618:9618"
    env_file:
      - /opt/cortexos/.secrets/adguard-exporter.env
    networks:
      - monitoring_default
      - cortex-internal

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  monitoring_default:
    external: true
  cortex-internal:
    external: true
