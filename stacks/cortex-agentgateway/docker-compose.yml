services:
  cortex-agentgateway:
    build:
      context: ../..
      dockerfile: stacks/cortex-agentgateway/Dockerfile
    image: cortex-agentgateway:local
    container_name: cortex-agentgateway
    restart: unless-stopped
    env_file:
      - /opt/cortexos/.secrets/agentgateway.env
    ports:
      - "127.0.0.1:18800:18800"
    networks:
      - cortex-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:18800/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  cortex-net:
    external: true
