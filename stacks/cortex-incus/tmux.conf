set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10
set -g focus-events on
set -g status-interval 5
set -g set-clipboard on
setw -g mode-keys vi

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Custom key bindings (sourced before TPM; plugin key OPTIONS below keep
#     plugins from clobbering these — see the comments by `run tpm`). ---
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"  # reload (lowercase r; resurrect uses R)
bind C-f run-shell "~/.tmux/plugins/tmux-fzf/main.sh"  # fzf launcher (main.sh = real launcher; not clobbered)
bind C-t choose-tree -Zw                                # zoomed window tree
bind | split-window -h -c "#{pane_current_path}"        # split horizontal, keep cwd
bind - split-window -v -c "#{pane_current_path}"        # split vertical, keep cwd
bind c new-window -c "#{pane_current_path}"             # new window, keep cwd

# NOTE: resurrect save/restore, sidebar, treemux, extrakto, menus and
# named-snapshot are bound via plugin OPTIONS (set below, before `run tpm`),
# NOT via manual `bind` lines. Several of those plugins bind their default
# keys at load time and would overwrite any manual `bind` that appears here;
# setting the option is the only deterministic way to pin them.

set -g @plugin "tmux-plugins/tpm"
set -g @plugin "b0o/tmux-autoreload"
set -g @plugin "tmux-plugins/tmux-cowboy"
set -g @plugin "thepante/tmux-git-autofetch"
set -g @plugin "jaclu/tmux-menus"
set -g @plugin "tmux-plugins/tmux-sidebar"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "noscript/tmux-mighty-scroll"
set -g @plugin "tmux-plugins/tmux-continuum"
set -g @plugin "sainnhe/tmux-fzf"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "spywhere/tmux-named-snapshot"
set -g @plugin "thewtex/tmux-mem-cpu-load"
set -g @plugin "tmux-plugins/tmux-prefix-highlight"
set -g @plugin "laktak/extrakto"
set -g @plugin "bjesus/muxile"
set -g @plugin "kiyoon/treemux"

# --- Behavior options ---
set -g @continuum-restore "on"
set -g @continuum-save-interval "15"
set -g @resurrect-capture-pane-contents "on"
set -g @resurrect-dir "~/.tmux/resurrect"
set -g @sidebar-tree-command "tree -C"
set -g @prefix_highlight_show_copy_mode "on"
set -g @prefix_highlight_show_sync_mode "on"

# --- Plugin KEY options (MUST be set before `run tpm`) -------------------
# Why before tpm: plugins bind their default keys when TPM sources them at
# the bottom of this file (last-bind-wins). Pinning the key via the plugin's
# own option is the only way that survives; manual `bind` lines that target a
# plugin's default key get silently overwritten. Each line also avoids the
# terminal-equivalent control keys C-m(=Enter) C-i(=Tab) C-h(=Bspace) C-[(=Esc).

# resurrect: defaults are C-s (save) / C-r (restore). C-s collided with the
# sidebar; move to plain letters. R is also default-bound by tmux-sensible to
# source-file, but resurrect loads AFTER sensible so resurrect wins (audited).
set -g @resurrect-save 'S'                 # prefix S  -> save session
set -g @resurrect-restore 'R'              # prefix R  -> restore session

# sidebar: defaults Tab (tree) + Bspace (focus). Tab clashes with treemux +
# extrakto; Bspace == C-h. Pin to control letters that nothing else uses.
set -g @sidebar-tree 'C-s'                 # prefix C-s -> file-tree sidebar
set -g @sidebar-tree-focus 'C-b'           # prefix C-b -> sidebar + focus it

# treemux: same Tab/Bspace defaults as sidebar. Keep treemux on Tab (distinct
# from sidebar's C-s) and move its focus key off Bspace(=C-h).
set -g @treemux-tree 'Tab'                 # prefix Tab -> nvim file tree
set -g @treemux-tree-focus 'C-y'           # prefix C-y -> nvim tree + focus

# extrakto: default is prefix+Tab (would fight sidebar/treemux). Pin to C-e.
set -g @extrakto_key 'C-e'                 # prefix C-e -> fuzzy text extract

# tmux-menus: default trigger is prefix+\ ; pin to C-Space (avoids C-m=Enter).
set -g @menus_trigger 'C-Space'            # prefix C-Space -> popup menus

# named-snapshot: defaults bind C-m(=Enter!) and C-n. Move to plain letters
# (M = save, N = restore; both prompt for a snapshot name).
set -g @named-snapshot-save 'M:*'          # prefix M -> save named snapshot
set -g @named-snapshot-restore 'N:*'       # prefix N -> restore named snapshot

run "~/.tmux/plugins/tpm/tpm"
