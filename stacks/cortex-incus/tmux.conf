# TMUX Config for CortexOS Incus Base Image
# Clean, minimal - works for SSH session management

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Basics
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on
set -g set-clipboard on
set -g base-index 1
setw -g pane-base-index 1

# Mouse mode
set -g mouse on

# VI keys
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Key bindings
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind x kill-pane
bind X kill-session

# Status bar
set -g status-position bottom
set -g status-interval 5
set -g status-style bg=colour235,fg=white
set -g status-left "#[bg=colour39,bold] #S #[bg=colour235] "
set -g status-right "#[fg=colour250] %H:%M | %d %b "
setw -g window-status-current-format "#[bg=colour39,bold] #I:#W "
setw -g window-status-format "#[fg=colour241] #I:#W "

# Plugins
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"
set -g @plugin "tmux-plugins/tmux-prefix-highlight"
set -g @plugin "b0o/tmux-autoreload"

# Plugin options
set -g @continuum-restore "on"
set -g @continuum-save-interval "15"
set -g @resurrect-capture-pane-contents "on"
set -g @resurrect-dir "~/.tmux/resurrect"
set -g @prefix_highlight_show_copy_mode "on"
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'

# TPM
run "~/.tmux/plugins/tpm/tpm"
