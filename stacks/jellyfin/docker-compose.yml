services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: cortex-jellyfin
    restart: unless-stopped
    ports:
      - "127.0.0.1:8096:8096"
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - /opt/cortexos/media:/media
    networks:
      - cortex-internal

volumes:
  jellyfin_config:
  jellyfin_cache:

networks:
  cortex-internal:
    external: true
