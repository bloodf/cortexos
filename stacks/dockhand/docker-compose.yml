services:
  dockhand:
    image: louislam/dockge:1
    container_name: cortex-dockhand
    restart: unless-stopped
    ports:
      - "127.0.0.1:3420:5001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/cortexos/stacks:/opt/stacks
      - dockhand_data:/app/data
    environment:
      DOCKGE_STACKS_DIR: /opt/stacks
    networks:
      - cortex-internal

volumes:
  dockhand_data:

networks:
  cortex-internal:
    external: true
