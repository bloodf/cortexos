services:
  nats:
    image: nats:2.10-alpine
    container_name: nats
    restart: unless-stopped
    network_mode: host
    command: ["-c", "/etc/nats/nats-server.conf"]
    volumes:
      - ./config/nats-server.conf:/etc/nats/nats-server.conf:ro
      - /opt/cortexos/stacks/nats/data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8222/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
