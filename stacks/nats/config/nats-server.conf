# NATS server config — cortex v2 (localhost-only, JetStream enabled)
server_name: cortex-nats
listen: 127.0.0.1:4222
http: 127.0.0.1:8222

max_connections: 1024
max_payload: 1MB

jetstream {
  store_dir: /data/jetstream
  max_memory_store: 256MB
  max_file_store: 4GB
}

# No auth — localhost-only bind makes this safe for single-VPS cortex.
# Tighten to token auth if exposed beyond 127.0.0.1.
