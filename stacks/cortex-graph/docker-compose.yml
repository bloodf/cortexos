# cortex-graph — LEGACY Docker Compose build.
#
# This file is preserved for reference and local experimentation only.
# Production deployments use the native systemd service at
# templates/systemd/cortex-graph.service, running a Python venv with
# uvicorn directly on the host.
services:
  cortex-graph:
    build:
      context: .
      dockerfile: Dockerfile
    image: cortex-graph:local
    container_name: cortex-graph
    restart: unless-stopped
    env_file:
      - /opt/cortexos/.secrets/graph.env
    environment:
      OTEL_SERVICE_NAME: cortex-graph
    ports:
      - "127.0.0.1:8090:8090"
    # No `depends_on`: NATS + Postgres are brought up by their own spokes
    # (prompts/tools/30-nats.md, prompts/tools/14-postgresql.md) and reached
    # over the external `cortex-net` network. Operator must start those first.
    networks:
      - cortex-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8090/healthz', timeout=3).status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  cortex-net:
    external: true
