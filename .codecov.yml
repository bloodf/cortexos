# Codecov configuration — CortexOS monorepo
#
# Source of truth: packages/dashboard/docs/TEST_STRATEGY.md §5
# Threshold: 95% on lines / branches / functions / statements.
# Per-PR delta: must not decrease by more than 1% (any metric).
#
# This file is enforced by:
#   - The `coverage` job in .github/workflows/ci.yml (primary enforcement
#     happens in vitest.config.ts; Codecov is the secondary layer).
#   - Branch protection: a "Codecov" check is required on protected branches.
#
# Schema reference: https://docs.codecov.com/docs/codecov-yaml

codecov:
  # Required for status checks + PR comments
  require_ci_to_pass: true
  notify:
    # Wait for CI to finish before posting the Codecov status check
    after_n_builds: 1
    wait_for_ci: true

coverage:
  precision: 2 # Report 2 decimal places (95.43% vs 95%)
  round: down # Round down — never up (don't let 94.99% squeak by)
  range: '80...100' # Red <80 / Yellow 80–95 / Green ≥95
  status:
    project:
      default:
        # Aggregate target per TEST_STRATEGY §5.1
        target: 95%
        threshold: 0% # Status fails immediately if below target
        if_ci_failed: error
        only_pulls: false
        paths:
          - 'packages/dashboard/src/**'
        # Informational only — do not fail the build on these:
        informational: false
        # Carry forward — base comparison is main, not a single prior commit
        carryforward: true
        # Per-metric targets (test_strategy §5.1 requires all four ≥95%)
        flags:
          - unittests

    patch:
      default:
        # Per-PR delta — a PR that drops coverage on any metric by >1% fails
        target: 0%
        threshold: 1% # Allow ≤1% drop to absorb incidental noise
        if_ci_failed: error
        only_pulls: true
        # The PR must ADD or MAINTAIN coverage. Net negative is a hard fail.
        informational: false

# Per-flag status check. Flags let us separate concerns if the matrix grows.
flag_management:
  default_rules:
    carryforward: true
    statuses:
      - type: project
        target: 95%
        threshold: 0%
      - type: patch
        target: 0%
        threshold: 1%
  individual_flags:
    - name: unittests
      paths:
        - packages/dashboard/src/

# Component-level grouping for the Codecov dashboard.
# Each `component` is a subgraph of the overall project; status checks
# inherit the project-level thresholds unless overridden here.
component_management:
  default_rules:
    statuses:
      - type: project
        target: 95%
        threshold: 0%
        if_ci_failed: error
      - type: patch
        target: 0%
        threshold: 1%
  individual_components:
    - component_id: dashboard_lib
      name: Dashboard lib (components, stores, hooks)
      paths:
        - packages/dashboard/src/lib/**
    - component_id: dashboard_routes
      name: Dashboard routes (pages, loaders, form actions, +server.ts)
      paths:
        - packages/dashboard/src/routes/**
    - component_id: dashboard_server
      name: Dashboard server (adapters, policy, audit, auth)
      paths:
        - packages/dashboard/src/lib/server/**

# Comments on PRs — keep the signal-to-noise high.
comment:
  layout: 'header, diff, flags, components, files, footer'
  behavior: default # Post a new comment on each push within a PR
  require_changes: false # Post on every push, not only when coverage moved
  require_base: true # Compare to base (main) — required for delta
  require_head: true # Compare to head — required for status
  # Hide the noisy file-tree from non-moved files
  hide_project_coverage: false
  hide_comment_details: false
  show_carryforward_flags: false

# Ignore paths that are NOT part of the source-of-truth surface.
# Each exclusion MUST have a one-line reason in the comment block on
# the right — that is the contract per TEST_STRATEGY §5.3.
ignore:
  # Generated types — re-running the generator reproduces them
  - '**/*.d.ts'
  # Test files themselves
  - '**/__tests__/**'
  - '**/*.test.ts'
  - '**/*.spec.ts'
  - '**/*.svelte.test.ts'
  # Mock layer — tested by E2E, not by unit tests (TEST_STRATEGY §4.4)
  - 'packages/dashboard/src/lib/mocks/**'
  - 'packages/dashboard/src/lib/server/mocks/**'
  # Server-only native module glue (PAM binding) — requires a real host
  - 'packages/dashboard/src/lib/server/native/**'
  # Configuration — exercised by the gate scripts themselves
  - '**/*.config.ts'
  - '**/*.config.js'
  - '**/vite.config.*'
  - '**/vitest.config.*'
  - '**/playwright.config.*'
  - '**/svelte.config.*'
  - '**/tailwind.config.*'
  - '**/postcss.config.*'
  # Build output
  - '**/.svelte-kit/**'
  - '**/build/**'
  - '**/dist/**'
  - '**/.next/**'
  # Dependencies
  - '**/node_modules/**'
  # Documentation
  - '**/*.md'
  # E2E specs (covered by Playwright run, not vitest)
  - '**/e2e/**'
  - '**/tests-e2e/**'
  # Coverage / SBOM / generated artifacts
  - '**/coverage/**'
  - '**/lcov.info'
  - '**/sbom*.json'

# GitHub Checks integration — the "Codecov" status is the one required
# by branch protection. Disable the legacy "patch" status since we
# surface it under "all-gates-pass" in ci.yml.
github_checks:
  annotations: true # Inline annotations on the diff
  disable_bid_cache: false # Speed: cache base SHA for delta
