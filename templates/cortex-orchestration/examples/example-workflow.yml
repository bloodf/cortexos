version: "0.7"
id: example-ci
name: Example CI Pipeline

inputs:
  ref:    { type: string, default: main }
  branch: { type: string, default: main }
  pr:     { type: integer, default: 0 }

defaults:
  timeout: 10m
  onError: fail

participants:
  install:
    type: exec
    image: node:24-alpine
    run: npm ci --no-audit --no-fund

  lint:
    type: exec
    image: node:24-alpine
    run: npm run lint

  test:
    type: exec
    image: node:24-alpine
    run: npm test -- --coverage

  build:
    type: exec
    image: node:24-alpine
    run: npm run build

  security:
    type: exec
    image: aquasec/trivy:latest
    run: trivy fs --severity HIGH,CRITICAL --exit-code 1 .

  deploy-staging:
    type: exec
    run: ./scripts/deploy-staging.sh
    timeout: 20m

  emit-success:
    type: emit
    event: cortex.workflow.example.run.completed
    payload:
      ref:    workflow.inputs.ref
      branch: workflow.inputs.branch
      pr:     workflow.inputs.pr
      status: "success"

flow:
  - install
  - parallel:
      - lint
      - test
      - security
  - build
  - if:
      condition: workflow.inputs.branch == "main"
      then:
        - deploy-staging
  - emit-success
