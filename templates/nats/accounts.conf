# CortexOS NATS NKey Accounts Configuration
# ---------------------------------------------------------------------------
# NKey provisioning: for each account, run on the VPS:
#   nk -gen account              → outputs Account Seed + Public key
#   nk -gen user -pubkey <APUB>  → outputs User Seed + Public key (per service)
#
# Replace {REPLACE_WITH_NKEY_PUB_*} placeholders with the generated public keys.
# Store seeds in /opt/cortexos/.secrets/nats-nkeys.env (0600, never commit).
#
# After editing, reload NATS: systemctl reload nats
# ---------------------------------------------------------------------------

jetstream: enabled

accounts: {

  # ---- SYS account (NATS internal) ----
  SYS: {
    users: [ { nkey: "{REPLACE_WITH_NKEY_PUB_SYS}" } ]
  }

  # ---- CONSUMER account — cortex-consumer daemon ----
  CONSUMER: {
    jetstream: enabled
    users: [ { nkey: "{REPLACE_WITH_NKEY_PUB_CONSUMER}" } ]
    exports: [
      { stream: "cortex.factory.>" }
      { stream: "cortex.approval.>" }
      { stream: "cortex.alert.>" }
      { stream: "cortex.health.>" }
      { stream: "cortex.consumer.errors" }
    ]
    imports: [
      { stream: { account: OPENCLAW, subject: "openclaw.message.received" } }
    ]
    limits: {
      max_connections: 10
      max_subscriptions: 100
      max_payload: 1048576  # 1 MB
    }
  }

  # ---- DASHBOARD account — Next.js dashboard ----
  DASHBOARD: {
    jetstream: enabled
    users: [ { nkey: "{REPLACE_WITH_NKEY_PUB_DASHBOARD}" } ]
    imports: [
      { stream: { account: CONSUMER, subject: "cortex.factory.>" } }
      { stream: { account: CONSUMER, subject: "cortex.approval.>" } }
      { stream: { account: CONSUMER, subject: "cortex.alert.>" } }
      { stream: { account: CONSUMER, subject: "cortex.health.>" } }
    ]
    limits: {
      max_connections: 20
      max_subscriptions: 200
      max_payload: 524288   # 512 KB
    }
  }

  # ---- AGENTGATEWAY account — AgentGateway sidecar ----
  AGENTGATEWAY: {
    jetstream: enabled
    users: [ { nkey: "{REPLACE_WITH_NKEY_PUB_AGENTGATEWAY}" } ]
    imports: [
      { stream: { account: CONSUMER, subject: "cortex.factory.>" } }
      { stream: { account: CONSUMER, subject: "cortex.approval.>" } }
    ]
    exports: [
      { stream: "cortex.audit.agentgateway.>" }
    ]
    limits: {
      max_connections: 10
      max_subscriptions: 50
      max_payload: 524288
    }
  }

  # ---- OPENCLAW account — OpenClaw messaging platform ----
  OPENCLAW: {
    jetstream: enabled
    users: [ { nkey: "{REPLACE_WITH_NKEY_PUB_OPENCLAW}" } ]
    exports: [
      { stream: "openclaw.message.received" }
    ]
    imports: [
      { stream: { account: CONSUMER, subject: "cortex.factory.created" } }
      { stream: { account: CONSUMER, subject: "cortex.factory.workflow.>" } }
    ]
    limits: {
      max_connections: 10
      max_subscriptions: 50
      max_payload: 1048576
    }
  }

}

system_account: SYS

# ---------------------------------------------------------------------------
# JetStream Streams (created at runtime by cortex-consumer ensureStreams())
# Documented here for operator reference and infra-as-code audits.
#
# Stream: cortex_factory       subjects: cortex.factory.>
# Stream: cortex_approval      subjects: cortex.approval.>
# Stream: cortex_alert         subjects: cortex.alert.>
# Stream: cortex_health        subjects: cortex.health.>
# Stream: cortex_consumer_errors subjects: cortex.consumer.errors  (DLQ)
# Stream: CORTEX               subjects: cortex.>, openclaw.>       (main)
#
# KV Bucket: cortex_approvals_seen
#   TTL: 10 minutes
#   Purpose: replay-nonce deduplication for approval events
#   Created by: cortex-consumer at startup via js.views.kv()
# ---------------------------------------------------------------------------
