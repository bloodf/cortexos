# Canonical GitHub labels for CortexOS project repositories.
# Sync with: gh label-sync (or equivalent) using this file as source of truth.
# Format: list of {name, color, description}. Colors are 6-char hex without leading '#'.

# ---------------------------------------------------------------------------
# Pipeline stages (see ARCHITECTURE.md)
# ---------------------------------------------------------------------------

- name: stage:triage
  color: ededed
  description: New issue inbox. Needs intent, scope, and owner assignment.

- name: stage:approved
  color: c2e0c6
  description: Well-formed issue queued for planning.

- name: stage:planning
  color: bfd4f2
  description: Implementation plan being authored; antagonist review of plan in progress.

- name: stage:in-progress
  color: 1d76db
  description: Code being written under TDD.

- name: stage:review-needed
  color: fbca04
  description: PR open; awaiting AI reviewers and CI.

- name: stage:changes-requested
  color: e99695
  description: At least one reviewer requested changes; engineer iterating.

- name: stage:antagonist-review
  color: d4c5f9
  description: Cross-model antagonist review of the final diff before QA.

- name: stage:qa
  color: f9d0c4
  description: QA validating acceptance criteria against the built artifact.

- name: stage:ready-to-merge
  color: 0e8a16
  description: All gates green; awaiting merge.

- name: stage:merged
  color: 6f42c1
  description: PR merged to main; deployment not yet triggered or verified.

- name: stage:deployed
  color: 5319e7
  description: Artifact promoted to target environment; not yet verified live.

- name: stage:verified
  color: 0075ca
  description: Post-deploy health checks confirmed; acceptance criteria observable.

- name: stage:done
  color: 2cbe4e
  description: Terminal success state. Issue closed.

- name: stage:blocked
  color: b60205
  description: Work cannot proceed without human or external input.

- name: stage:rejected
  color: 4c4c4c
  description: Out of scope, duplicate, or invalid. Will not be worked.

# ---------------------------------------------------------------------------
# Agent assignment
# ---------------------------------------------------------------------------

- name: agent:pm
  color: 0052cc
  description: Owned by the PM agent. Routes scope, priority, and human escalation.

- name: agent:ceo
  color: 002060
  description: Owned by the CEO agent. Product strategy and external commitments.

- name: agent:cto
  color: 1d3557
  description: Owned by the CTO agent. Technical strategy and infra direction.

- name: agent:po
  color: 1f6feb
  description: Owned by the Product Owner agent. Backlog grooming and acceptance criteria.

- name: agent:qa
  color: f4a261
  description: Owned by the QA agent. Acceptance and post-deploy verification.

- name: agent:uxui
  color: c084fc
  description: Owned by the UX/UI agent. Interaction and visual design.

- name: agent:engineer
  color: 0e8a16
  description: Owned by a generalist engineer agent.

- name: agent:eng-backend
  color: 116329
  description: Owned by a backend engineer agent.

- name: agent:eng-frontend
  color: 22863a
  description: Owned by a frontend engineer agent.

- name: agent:eng-mobile
  color: 2da44e
  description: Owned by a mobile engineer agent.

- name: agent:eng-esp32
  color: 8b4513
  description: Owned by an ESP32 firmware engineer agent.

- name: agent:staff-eng
  color: 044289
  description: Owned by the Staff Engineer agent. Architecture and antagonist orchestration.

- name: agent:cortex
  color: 24292e
  description: Owned by the Cortex sys-admin agent. Infra, automation, and mechanical pipeline moves.

- name: agent:antagonist
  color: 5a1e8a
  description: Owned by the Antagonist reviewer agent. Cross-model adversarial review of plans and diffs.

# ---------------------------------------------------------------------------
# Priority
# ---------------------------------------------------------------------------

- name: priority:critical
  color: b60205
  description: Production impact, security risk, or blocking the entire fleet. Respond within 15 minutes.

- name: priority:high
  color: d93f0b
  description: Blocks active sprint or CI on main. Respond within 1 hour.

- name: priority:medium
  color: fbca04
  description: Single workstream blocked; no broader impact. Respond within 4 hours.

- name: priority:low
  color: c5def5
  description: No time pressure. Respond within 24 hours.

# ---------------------------------------------------------------------------
# Type
# ---------------------------------------------------------------------------

- name: type:epic
  color: 3e4b9e
  description: Multi-issue initiative with its own acceptance criteria and child issues.

- name: type:story
  color: 7e57c2
  description: User-visible behavior change scoped to a single deliverable.

- name: type:task
  color: 0366d6
  description: Concrete unit of work; smaller than a story.

- name: type:bug
  color: d73a4a
  description: Defect in existing behavior.

- name: type:tech-debt
  color: 795548
  description: Refactor, cleanup, or remediation with no new user-visible behavior.

# ---------------------------------------------------------------------------
# Gates (required checks attached to stage transitions)
# ---------------------------------------------------------------------------

- name: gate:staff-reviewed
  color: 1d3557
  description: Staff engineer reviewed the plan or diff. Required before stage:review-needed exits.

- name: gate:cto-approved
  color: 0d2c4f
  description: CTO sign-off on architectural impact. Required before stage:ready-to-merge.

- name: gate:security-reviewed
  color: b60205
  description: Security reviewer cleared the diff. Required before stage:ready-to-merge.

- name: gate:qa-passed
  color: 0e8a16
  description: QA confirmed acceptance criteria met. Required before stage:ready-to-merge.

- name: gate:qa-video-attached
  color: 2cbe4e
  description: QA video evidence attached to the PR. Required for UI-bearing changes.

- name: gate:visual-approved
  color: c084fc
  description: UX/UI agent approved the visual diff. Required for UI-bearing changes.

- name: gate:po-accepted
  color: 1f6feb
  description: Product Owner accepted the deliverable against acceptance criteria.

# ---------------------------------------------------------------------------
# Coordination
# ---------------------------------------------------------------------------

- name: needs-clarification
  color: ffeb3b
  description: Blocked pending answers from owner or upstream stakeholder.
