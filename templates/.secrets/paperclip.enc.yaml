# SOPS-encrypted secrets for Paperclip Hermes adapter.
# Before commit: `sops -e -i templates/.secrets/paperclip.enc.yaml`
# After commit: only encrypted form should land in git.
# This file is committed in plaintext as a TEMPLATE — operators
# encrypt with their real age key set.
PAPERCLIP_API_URL: "<replace-me>"
PAPERCLIP_API_KEY: "<replace-me>"
PAPERCLIP_WEBHOOK_SECRET: "<replace-me>"
PAPERCLIP_ADAPTER: "hermes_local"
HERMES_PROFILE_MAP: "{\"primary\":\"primary\",\"secondary\":\"secondary\"}"
HERMES_PRIMARY_URL: "http://127.0.0.1:18691/v1"
HERMES_SECONDARY_URL: "http://127.0.0.1:18692/v1"
PG_DSN: "postgres://cortex:<replace-me>@127.0.0.1:5432/cortex"
