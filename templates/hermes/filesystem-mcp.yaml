mcp_servers:
  filesystem:
    command: "sh"
    args: ["-lc", "exec npx -y @modelcontextprotocol/server-filesystem ${MCP_FILESYSTEM_ROOTS}"]
  agentgateway:
    command: "node"
    args: ["${CORTEX_AGENTGATEWAY_MCP_BIN}"]
    env:
      AGENTGATEWAY_MCP_CONFIG: "${AGENTGATEWAY_MCP_CONFIG}"
      AGENTGATEWAY_MCP_TIMEOUT_MS: "${AGENTGATEWAY_MCP_TIMEOUT_MS}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL}"
      EMBEDDING_PROVIDER: "${EMBEDDING_PROVIDER}"
      MILVUS_ADDRESS: "${MILVUS_ADDRESS}"
      MILVUS_TOKEN: "${MILVUS_TOKEN}"
      MINIMAX_API_KEY: "${MINIMAX_API_KEY}"
      MCP_MINIMAX_BASE_PATH: "${MCP_MINIMAX_BASE_PATH}"
      MINIMAX_API_HOST: "${MINIMAX_API_HOST}"
      MINIMAX_API_RESOURCE_MODE: "${MINIMAX_API_RESOURCE_MODE}"
      Z_AI_MODE: "${Z_AI_MODE}"
      Z_AI_API_KEY: "${Z_AI_API_KEY}"
      ZAI_WEB_READER_AUTHORIZATION: "${ZAI_WEB_READER_AUTHORIZATION}"
      ZAI_WEB_SEARCH_PRIME_AUTHORIZATION: "${ZAI_WEB_SEARCH_PRIME_AUTHORIZATION}"
      ZAI_ZREAD_AUTHORIZATION: "${ZAI_ZREAD_AUTHORIZATION}"
      CORTEX_LOCAL_TIMEZONE: "${CORTEX_LOCAL_TIMEZONE}"
