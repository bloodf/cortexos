display_information:
  name: CortexOS Agents
  description: Visible Slack war room for CortexOS agent issues, PRs, reviews, blockers, and approvals.
  background_color: "#101828"
features:
  bot_user:
    display_name: CortexOS Agents
    always_online: true
  slash_commands:
    - command: /cortex
      description: CortexOS agent command router
      usage_hint: status | issue <number> | approve <repo> <pr> | reject <repo> <pr> <reason>
      should_escape: false
    - command: /cortex-approve
      description: Approve and merge a CortexOS PR, then close the linked issue
      usage_hint: <repo-slug> <pr-number>
      should_escape: false
    - command: /cortex-reject
      description: Reject a CortexOS PR and restart/rework the linked issue
      usage_hint: <repo-slug> <pr-number> <reason>
      should_escape: false
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:join
      - channels:read
      - chat:write
      - chat:write.public
      - commands
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - reactions:read
      - reactions:write
      - users:read
settings:
  interactivity:
    is_enabled: true
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
      - reaction_added
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
