# Lima VM template — Debian 13 (Trixie) for CortexOS rehearsal
# Operator should pin sha256 digests in production.
images:
  - location: "https://cloud.debian.org/images/cloud/trixie/latest/debian-13-genericcloud-arm64.qcow2"
    arch: "aarch64"
    digest: null
  - location: "https://cloud.debian.org/images/cloud/trixie/latest/debian-13-genericcloud-amd64.qcow2"
    arch: "x86_64"
    digest: null

cpus: 2
memory: 4GiB
disk: 20GiB

mounts:
  - location: "~"
    writable: false
  - location: "{{.Dir}}/.."
    writable: true
    mountPoint: "/opt/cortexos-src"

containerd:
  system: false
  user: false

ssh:
  localPort: 0
  loadDotSSHPubKeys: true

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eu
      bash /opt/cortexos-src/lima/provision.sh debian
