<!doctype html>
<html
	lang="%sveltekit.lang%"
	class="h-full theme-cortex"
	data-mode="light"
	style="color-scheme: light dark;"
>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="CortexOS dashboard — self-hosted control plane" />
		<meta name="color-scheme" content="light dark" />
		<meta name="theme-color" content="#7c3aed" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<!--
			No-flash inline script: reconcile the persisted theme + brand preset
			before paint so the user does not see a default-then-flicker swap.
			Reads `cortex-preset` + `cortex-mode` cookies; the values are set by
			the server-side load (`+layout.server.ts`) on first paint.
		-->
		<script>
			(function () {
				try {
					function readCookie(name) {
						var m = document.cookie.match(
							new RegExp('(?:^|;\\s*)' + name + '=([^;]+)')
						);
						return m ? decodeURIComponent(m[1]) : null;
					}
					var preset = readCookie('cortex-preset');
					var mode = readCookie('cortex-mode');
					var root = document.documentElement;
					if (
						preset &&
						['cortex', 'teal', 'emerald', 'amber'].indexOf(preset) >= 0
					) {
						root.classList.remove('theme-cortex', 'theme-teal', 'theme-emerald', 'theme-amber');
						root.classList.add('theme-' + preset);
					}
					if (mode === 'dark' || mode === 'light') {
						root.classList.toggle('dark', mode === 'dark');
						root.classList.toggle('light', mode === 'light');
						root.setAttribute('data-mode', mode);
					} else {
						var prefersDark =
							window.matchMedia &&
							window.matchMedia('(prefers-color-scheme: dark)').matches;
						root.classList.toggle('dark', prefersDark);
						root.classList.toggle('light', !prefersDark);
						root.setAttribute('data-mode', prefersDark ? 'dark' : 'light');
					}
				} catch (e) {
					/* No-op: graceful default on cookie/JS error. */
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="h-full bg-background text-foreground">
		<div style="display: contents" class="h-full">%sveltekit.body%</div>
	</body>
</html>
