# Local-dev helper for the Cortex Dashboard.
# The production dashboard runs as the cortex-dashboard.service systemd unit.
# See templates/systemd/cortex-dashboard.service.
#
# Usage:
#   docker compose --profile local-db up -d     # DB only (for pnpm dev)
#   docker compose up -d                          # DB + app (full stack)

services:
  db:
    image: postgres:17-alpine
    container_name: cortex-dashboard-db
    profiles: ["local-db", "app"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: cortex_dashboard
      POSTGRES_USER: dashboard
      POSTGRES_PASSWORD: ${DASHBOARD_DB_PASSWORD:?Set DASHBOARD_DB_PASSWORD}
    volumes:
      - dashboard-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboard -d cortex_dashboard"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - cortex-dashboard

  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: cortex-dashboard-app
    profiles: ["app"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: cortex_dashboard
      DB_USER: dashboard
      DB_PASSWORD: ${DASHBOARD_DB_PASSWORD}
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3080
    ports:
      - "3080:3080"
    networks:
      - cortex-dashboard

volumes:
  dashboard-db:
    name: cortex-dashboard-db

networks:
  cortex-dashboard:
    name: cortex-dashboard
