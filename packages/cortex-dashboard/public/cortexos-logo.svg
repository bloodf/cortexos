<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CortexOS Logo</title>
  <desc id="desc">CortexOS logo for an open-source local VPS and homelab AI machine, featuring a local compute core, AI network nodes, and developer terminal motifs.</desc>

  <defs>
    <linearGradient id="brand" x1="100" y1="56" x2="282" y2="258" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.52" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>

    <linearGradient id="brandSoft" x1="116" y1="70" x2="250" y2="238" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="0.58" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>

    <radialGradient id="coreGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 160) rotate(90) scale(132)">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#3B82F6" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="34" y="20" width="300" height="280" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#22D3EE" flood-opacity="0.26"/>
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#6366F1" flood-opacity="0.15"/>
    </filter>

    <filter id="wordGlow" x="360" y="80" width="720" height="150" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#38BDF8" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- Transparent background; glow works well on dark README surfaces -->
  <circle cx="180" cy="160" r="132" fill="url(#coreGlow)"/>

  <!-- Icon: local VPS compute core + AI/homelab nodes -->
  <g filter="url(#glow)">
    <!-- Local network orbit, not a cloud/house/server rack -->
    <path d="M180 54C238.5 54 286 101.5 286 160C286 218.5 238.5 266 180 266C121.5 266 74 218.5 74 160C74 101.5 121.5 54 180 54Z"
          stroke="url(#brand)" stroke-width="3" stroke-dasharray="1 13" stroke-linecap="round" opacity="0.72"/>

    <!-- Connection topology -->
    <path d="M180 80V111" stroke="#38BDF8" stroke-width="2.4" stroke-linecap="round" opacity="0.75"/>
    <path d="M180 209V240" stroke="#8B5CF6" stroke-width="2.4" stroke-linecap="round" opacity="0.75"/>
    <path d="M100 160H132" stroke="#22D3EE" stroke-width="2.4" stroke-linecap="round" opacity="0.75"/>
    <path d="M228 160H260" stroke="#60A5FA" stroke-width="2.4" stroke-linecap="round" opacity="0.75"/>
    <path d="M126 106L149 129" stroke="#38BDF8" stroke-width="2.1" stroke-linecap="round" opacity="0.55"/>
    <path d="M234 106L211 129" stroke="#60A5FA" stroke-width="2.1" stroke-linecap="round" opacity="0.55"/>
    <path d="M126 214L149 191" stroke="#8B5CF6" stroke-width="2.1" stroke-linecap="round" opacity="0.55"/>
    <path d="M234 214L211 191" stroke="#7DD3FC" stroke-width="2.1" stroke-linecap="round" opacity="0.55"/>

    <!-- Outer service nodes -->
    <circle cx="180" cy="78" r="9" fill="#071426" stroke="#22D3EE" stroke-width="3"/>
    <circle cx="180" cy="242" r="9" fill="#071426" stroke="#8B5CF6" stroke-width="3"/>
    <circle cx="98" cy="160" r="9" fill="#071426" stroke="#22D3EE" stroke-width="3"/>
    <circle cx="262" cy="160" r="9" fill="#071426" stroke="#60A5FA" stroke-width="3"/>
    <circle cx="124" cy="104" r="6" fill="#22C55E"/>
    <circle cx="236" cy="104" r="6" fill="#22C55E"/>
    <circle cx="124" cy="216" r="6" fill="#22C55E"/>
    <circle cx="236" cy="216" r="6" fill="#22C55E"/>

    <!-- Main local VPS machine mark: abstract compute cube/hex core -->
    <path d="M180 96L235.4 128V192L180 224L124.6 192V128L180 96Z"
          fill="#08111F" stroke="url(#brand)" stroke-width="4" stroke-linejoin="round"/>
    <path d="M180 96V160M124.6 128L180 160M235.4 128L180 160M180 224V160M124.6 192L180 160M235.4 192L180 160"
          stroke="#1E40AF" stroke-width="2" opacity="0.72"/>

    <!-- Inner OS terminal window -->
    <rect x="149" y="134" width="62" height="52" rx="10" fill="#0B172A" stroke="#334155" stroke-width="2"/>
    <circle cx="162" cy="148" r="3" fill="#22C55E"/>
    <circle cx="174" cy="148" r="3" fill="#38BDF8"/>
    <circle cx="186" cy="148" r="3" fill="#8B5CF6"/>
    <path d="M161 165L171 172L161 179" stroke="#67E8F9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M181 178H199" stroke="#A78BFA" stroke-width="3" stroke-linecap="round"/>

    <!-- AI neural mesh inside the compute node -->
    <circle cx="149" cy="128" r="4" fill="#67E8F9"/>
    <circle cx="211" cy="128" r="4" fill="#A78BFA"/>
    <circle cx="149" cy="192" r="4" fill="#A78BFA"/>
    <circle cx="211" cy="192" r="4" fill="#67E8F9"/>
    <circle cx="180" cy="160" r="4.8" fill="#F8FAFC"/>
    <path d="M149 128L180 160L211 128M149 192L180 160L211 192" stroke="#38BDF8" stroke-width="1.5" opacity="0.58"/>
  </g>

  <!-- Developer/open-source hint: branching line beside mark -->
  <g opacity="0.7">
    <path d="M320 114V206" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
    <circle cx="320" cy="114" r="5" fill="#22C55E"/>
    <circle cx="320" cy="160" r="5" fill="#38BDF8"/>
    <circle cx="320" cy="206" r="5" fill="#8B5CF6"/>
    <path d="M320 160C346 160 346 134 372 134" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
    <path d="M320 160C346 160 346 186 372 186" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <g filter="url(#wordGlow)">
    <text x="400" y="180"
          font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="88"
          font-weight="760"
          letter-spacing="-3.2"
          fill="#F8FAFC">CortexOS</text>

    <text x="406" y="226"
          font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="24"
          font-weight="520"
          letter-spacing="4.8"
          fill="#94A3B8">OPEN-SOURCE LOCAL AI VPS</text>

    <path d="M405 196H620" stroke="url(#brand)" stroke-width="4" stroke-linecap="round"/>
    <path d="M642 196H744" stroke="#334155" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
