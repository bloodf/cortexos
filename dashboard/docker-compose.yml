# Dashboard runs as cortex-dashboard.service (systemd) on the VPS.
# Docker compose is retained only for ad-hoc local DB experimentation.
# See dashboard/CLAUDE.md.
services:
  db:
    image: postgres:17-alpine
    container_name: cortex-dashboard-db
    profiles: ["local-db"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: cortex_dashboard
      POSTGRES_USER: dashboard
      POSTGRES_PASSWORD: ${DASHBOARD_DB_PASSWORD:?Set DASHBOARD_DB_PASSWORD}
    volumes:
      - dashboard-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboard -d cortex_dashboard"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  dashboard-db:
    name: cortex-dashboard-db
