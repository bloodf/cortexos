services:
  hermes-webui:
    image: ghcr.io/nesquena/hermes-webui@sha256:c82fbd0501080ec6843c83c9637a74e411f5155028d51b146c159eb80c875486
    container_name: hermes-webui
    restart: unless-stopped
    # Only the password comes from the host secret (injected by systemd's
    # EnvironmentFile= and passed through). HOST/PORT/STATE_DIR are
    # container-internal values — the host-side port (18787) and state dir
    # (/var/lib/hermes-webui) live in the ports:/volumes: maps below.
    environment:
      HERMES_WEBUI_PASSWORD: ${HERMES_WEBUI_PASSWORD}
      HERMES_WEBUI_HOST: '0.0.0.0'
      HERMES_WEBUI_PORT: '8787'
      HERMES_WEBUI_STATE_DIR: '/data'
      HERMES_WEBUI_NO_BROWSER: '1'
    ports:
      - '127.0.0.1:18787:8787'
    volumes:
      - /var/lib/hermes-webui:/data
    healthcheck:
      test:
        [
          'CMD',
          'python3',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/health', timeout=2).read()",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
